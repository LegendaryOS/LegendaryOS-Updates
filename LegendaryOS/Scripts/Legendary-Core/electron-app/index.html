<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegendaryOS Kernel Selector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>LegendaryOS Kernel Selector</h1>
        <div id="kernel-list">
            <button class="kernel-btn" data-kernel="xanmod">Xanmod Kernel</button>
            <button class="kernel-btn" data-kernel="zen">Zen Kernel</button>
            <button class="kernel-btn" data-kernel="tkg">TKG Kernel</button>
            <button class="kernel-btn" data-kernel="cacule">Cacule Kernel</button>
            <button class="kernel-btn" data-kernel="lts">LTS Kernel</button>
            <button class="kernel-btn" data-kernel="hardened">Hardened Kernel</button>
            <button class="kernel-btn" data-kernel="arch">Arch Kernel</button>
        </div>
        <div class="bottom-left">
            <label>
                <input type="checkbox" id="remember-choice"> Remember my choice
            </label>
        </div>
        <div id="status"></div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
